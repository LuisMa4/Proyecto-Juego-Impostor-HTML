<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas Online - El Impostor</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .evento-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .evento-overlay.activo {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .evento-content {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            animation: scaleIn 0.5s;
        }

        .evento-content h1 {
            color: white;
            font-size: 2.5rem;
            margin: 0 0 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .evento-content p {
            color: white;
            font-size: 1.3rem;
            margin: 0;
            line-height: 1.6;
        }

        .round-info {
            color: white;
            font-weight: bold;
            margin: -22px 0 24px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.25);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="notification-container"></div>

    <div id="evento-overlay" class="evento-overlay">
        <div class="evento-content">
            <h1>EVENTO ESPECIAL</h1>
            <p>Esta ronda habra <strong>UN IMPOSTOR EXTRA</strong></p>
        </div>
    </div>

    <div class="menu-container">
        <h1>Turno de <span id="nombre-jugador">Jugador</span></h1>
        <p class="round-info" id="round-info"></p>

        <div class="game-container">
            <div class="card-flip" id="card-flip">
                <div class="card-front">
                    <img id="foto-jugador" src="" alt="Foto" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid #2E7D32; object-fit: cover; margin-bottom: 15px; display: none;">
                    <h2 id="nombre-en-front" style="font-size: 2.5rem; margin: 0 0 30px 0; color: #2E7D32;">Jugador</h2>
                    <p style="font-size: 0.9rem; color: #666; margin: 5px 0;">Presiona y manten</p>
                    <p style="font-size: 0.9rem; color: #666; margin: 5px 0;">para ver tu rol</p>
                </div>
                <div class="card-back" id="card-back">
                    <div id="card-back-content">
                        <h3 id="nombre-en-tarjeta" style="font-size: 1.8rem; margin: 0;">Jugador</h3>
                    </div>
                </div>
            </div>

            <button class="button" id="next-button">Pasar a <span id="next-player">Jugador</span></button>
        </div>
    </div>

    <script>
        const partidaOnline = JSON.parse(localStorage.getItem('configPartidaOnline'));

        if (!partidaOnline || !partidaOnline.jugadores || !partidaOnline.configuracion) {
            window.location.href = 'crear_sala.html';
        }

        const jugadores = partidaOnline.jugadores;
        const config = partidaOnline.configuracion;
        const sala = partidaOnline.sala;
        const numJugadores = jugadores.length;
        const numImpostores = Math.min(config.impostores || 1, Math.max(1, numJugadores - 1));
        const mostrarPistas = Boolean(config.pistas);
        let jugadorActual = 0;
        let palabras = [];
        let rolesAsignados = [];
        let palabraRonda = null;

        function mostrarNotificacion(mensaje, tipo = 'error') {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            notification.className = `notification notification-${tipo}`;
            notification.textContent = mensaje;
            container.appendChild(notification);

            setTimeout(() => notification.classList.add('show'), 10);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function asignarRoles() {
            const eventoEspecial = numJugadores >= 5 &&
                                  numImpostores < numJugadores / 2 &&
                                  (numImpostores + 1) < numJugadores / 2 &&
                                  Math.random() < 1.0;
            let impostoresRonda = numImpostores;

            if (eventoEspecial && numImpostores < numJugadores - 1) {
                impostoresRonda = numImpostores + 1;
                const eventoOverlay = document.getElementById('evento-overlay');
                eventoOverlay.classList.add('activo');
                setTimeout(() => eventoOverlay.classList.remove('activo'), 3000);
            }

            rolesAsignados = new Array(numJugadores).fill('inocente');
            const impostoresIndices = [];

            while (impostoresIndices.length < impostoresRonda) {
                const indice = Math.floor(Math.random() * numJugadores);
                if (!impostoresIndices.includes(indice)) {
                    impostoresIndices.push(indice);
                    rolesAsignados[indice] = 'impostor';
                }
            }
        }

        async function cargarPalabras() {
            const categoriasDefault = [
                { id: 1, nombre: 'Cosas cotidianas', archivo: '../../data/categorias/cosas_cotidianas.csv' },
                { id: 2, nombre: 'Personajes famosos', archivo: '../../data/categorias/famosos.csv' },
                { id: 3, nombre: 'Futbolistas', archivo: '../../data/categorias/futbolistas.csv' },
                { id: 4, nombre: 'Peliculas', archivo: '../../data/categorias/peliculas.csv' }
            ];

            const listasSeleccionadas = config.listas || [];
            const personalizadas = config.categoriasPersonalizadas || [];

            for (const listaId of listasSeleccionadas) {
                const categoria = categoriasDefault.find(c => String(c.id) === String(listaId));
                const categoriaPersonalizada = personalizadas.find(c => String(c.id) === String(listaId));

                if (categoria) {
                    await cargarCsvCategoria(categoria.archivo);
                } else if (categoriaPersonalizada) {
                    palabras.push({
                        palabra: categoriaPersonalizada.nombre,
                        pista: categoriaPersonalizada.origen ? `Categoria subida por ${categoriaPersonalizada.origen}` : ''
                    });
                }
            }

            if (palabras.length === 0) {
                palabras.push({ palabra: 'El Impostor', pista: 'Categoria por defecto' });
                mostrarNotificacion('No se pudieron cargar categorias, se uso una palabra por defecto', 'info');
            }
        }

        async function cargarCsvCategoria(archivo) {
            try {
                const response = await fetch(archivo);
                const csv = await response.text();
                const lineas = csv.split('\n').filter(line => line.trim() !== '');

                for (let i = 1; i < lineas.length; i++) {
                    const partes = lineas[i].split(',');
                    if (partes[0]) {
                        palabras.push({
                            palabra: partes[0].trim(),
                            pista: partes[1] ? partes[1].trim() : ''
                        });
                    }
                }
            } catch (error) {
                console.error('Error al cargar categoria:', error);
            }
        }

        function mostrarJugador() {
            const jugador = jugadores[jugadorActual];
            const nombreActual = jugador.nombre;
            const fotoActual = jugador.foto;
            const siguienteIndice = (jugadorActual + 1) % numJugadores;

            document.getElementById('nombre-jugador').textContent = nombreActual;
            document.getElementById('nombre-en-front').textContent = nombreActual;
            document.getElementById('round-info').textContent = sala ? `Sala: ${sala.nombre}` : 'Partida online';

            if (siguienteIndice === 0) {
                document.getElementById('next-button').textContent = 'Ir a Reunion';
            } else {
                const nombreSiguiente = jugadores[siguienteIndice].nombre;
                document.getElementById('next-button').innerHTML = `Pasar a <span id="next-player">${escapeHtml(nombreSiguiente)}</span>`;
            }

            const fotoJugador = document.getElementById('foto-jugador');
            if (fotoActual) {
                fotoJugador.src = fotoActual;
                fotoJugador.style.display = 'block';
            } else {
                fotoJugador.style.display = 'none';
            }

            const card = document.getElementById('card-flip');
            const cardBack = document.getElementById('card-back');
            const cardBackContent = document.getElementById('card-back-content');

            card.classList.remove('flipped');
            cardBack.style.backgroundColor = 'white';
            cardBack.style.color = '#333';
            cardBackContent.innerHTML = `<h3 style="font-size: 1.8rem; margin: 0;">${escapeHtml(nombreActual)}</h3>`;
        }

        const card = document.getElementById('card-flip');
        let presionando = false;

        card.addEventListener('mousedown', () => {
            presionando = true;
            setTimeout(() => {
                if (presionando) {
                    mostrarRol();
                }
            }, 200);
        });

        card.addEventListener('mouseup', () => {
            presionando = false;
            ocultarRol();
        });

        card.addEventListener('mouseleave', () => {
            if (presionando) {
                presionando = false;
                ocultarRol();
            }
        });

        card.addEventListener('touchstart', event => {
            event.preventDefault();
            presionando = true;
            setTimeout(() => {
                if (presionando) {
                    mostrarRol();
                }
            }, 200);
        });

        card.addEventListener('touchend', event => {
            event.preventDefault();
            presionando = false;
            ocultarRol();
        });

        function mostrarRol() {
            const cardBack = document.getElementById('card-back');
            const cardBackContent = document.getElementById('card-back-content');

            if (rolesAsignados[jugadorActual] === 'impostor') {
                cardBack.style.backgroundColor = '#d32f2f';
                cardBack.style.color = 'white';

                let contenido = '<h2 style="font-size: 2.5rem; margin: 0; color: white;">Eres el IMPOSTOR</h2>';

                if (mostrarPistas && palabraRonda.pista) {
                    contenido += `<p style="font-size: 1.1rem; margin-top: 20px; color: white;">Pista: ${escapeHtml(palabraRonda.pista)}</p>`;
                }

                cardBackContent.innerHTML = contenido;
            } else {
                cardBack.style.backgroundColor = '#2E7D32';
                cardBack.style.color = 'white';
                cardBackContent.innerHTML = `<h2 style="font-size: 2.5rem; margin: 0; color: white;">${escapeHtml(palabraRonda.palabra)}</h2>`;
            }

            card.classList.add('flipped');
        }

        function ocultarRol() {
            const jugador = jugadores[jugadorActual];
            const cardBack = document.getElementById('card-back');
            const cardBackContent = document.getElementById('card-back-content');

            cardBack.style.backgroundColor = 'white';
            cardBack.style.color = '#333';
            cardBackContent.innerHTML = `<h3 style="font-size: 1.8rem; margin: 0;">${escapeHtml(jugador.nombre)}</h3>`;
            card.classList.remove('flipped');
        }

        document.getElementById('next-button').addEventListener('click', () => {
            jugadorActual = (jugadorActual + 1) % numJugadores;

            if (jugadorActual === 0) {
                guardarResultadoRonda();
                mostrarNotificacion('Todos vieron su carta. Reunion lista.', 'success');
            } else {
                mostrarJugador();
            }
        });

        function guardarResultadoRonda() {
            const ronda = {
                sala,
                jugadores,
                roles: rolesAsignados,
                palabra: palabraRonda,
                configuracion: config
            };
            localStorage.setItem('rondaOnlineActual', JSON.stringify(ronda));
        }

        async function iniciarJuego() {
            await cargarPalabras();
            asignarRoles();
            palabraRonda = palabras[Math.floor(Math.random() * palabras.length)];
            guardarResultadoRonda();
            mostrarJugador();
        }

        function escapeHtml(texto) {
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        iniciarJuego();
    </script>
</body>
</html>
